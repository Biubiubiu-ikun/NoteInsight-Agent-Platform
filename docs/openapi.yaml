openapi: 3.1.0
info:
  title: NoteInsight API
  version: 0.7.3
  description: Phase 7 lexical, vector, and hybrid evidence retrieval plus authenticated content APIs.
servers:
  - url: http://localhost:18080
paths:
  /api/v1/health:
    get:
      tags: [Operations]
      responses:
        '200':
          description: Process liveness probe.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, const: ok }
  /api/v1/ready:
    get:
      tags: [Operations]
      responses:
        '200':
          description: PostgreSQL and Redis are available.
        '503':
          description: At least one required dependency is unavailable.
  /api/v1/retrieval/search:
    post:
      tags: [Retrieval]
      description: Lexical, dense-vector, or RRF hybrid retrieval over an immutable evidence ingestion run. A bearer token is optional and expands project-scoped visibility only through active project membership.
      security: [{}, { bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetrievalSearchRequest' }
      responses:
        '200':
          description: Authorized, confidence-filtered evidence chunks with exact source citations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RetrievalSearchResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }
        '504': { $ref: '#/components/responses/Error' }
  /api/v1/auth/register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { $ref: '#/components/responses/AuthResponse' }
        '409': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
  /api/v1/auth/login:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/AuthResponse' }
        '401': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      description: Rotates the HttpOnly refresh cookie. A refresh_token body remains supported for CLI clients.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200': { $ref: '#/components/responses/AuthResponse' }
        '401': { $ref: '#/components/responses/Error' }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      responses:
        '200':
          description: Session revoked and refresh cookie cleared.
  /api/v1/me:
    get:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Error' }
    patch:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname: { type: string, maxLength: 64 }
                avatar_url: { type: string, maxLength: 512 }
                bio: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
  /api/v1/notes:
    get:
      tags: [Notes]
      parameters:
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: project_id, schema: { type: integer, format: int64 } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200':
          description: Keyset-paginated note summaries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotePage' }
    post:
      tags: [Notes]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateNoteRequest' }
      responses:
        '201':
          description: Created note.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/v1/notes/{note_id}:
    parameters:
      - { $ref: '#/components/parameters/NoteID' }
    get:
      tags: [Notes]
      responses:
        '200':
          description: Full note with media, author projection, and optional viewer state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      tags: [Notes]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, maxLength: 255 }
                body: { type: string, maxLength: 20000 }
                category: { type: string, maxLength: 64 }
      responses:
        '200':
          description: Updated note; emits note.updated v1.
        '403': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Notes]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Soft-deleted note; emits note.deleted v1. }
        '403': { $ref: '#/components/responses/Error' }
  /api/v1/notes/{note_id}/comments:
    parameters:
      - { $ref: '#/components/parameters/NoteID' }
    get:
      tags: [Comments]
      parameters:
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200': { description: Keyset-paginated active comments. }
    post:
      tags: [Comments]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                parent_id: { type: integer, format: int64, minimum: 0 }
                content: { type: string, maxLength: 2000 }
                intent: { type: string, maxLength: 64 }
      responses:
        '201': { description: Created comment. }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/v1/comments/{comment_id}:
    parameters:
      - $ref: '#/components/parameters/CommentID'
    delete:
      tags: [Comments]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Soft-deleted comment; emits comment.deleted v1. }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/v1/notes/{note_id}/like:
    parameters: [{ $ref: '#/components/parameters/NoteID' }]
    post: &idempotentCreate
      tags: [Interactions]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Idempotent state transition. }
        '401': { $ref: '#/components/responses/Error' }
    delete: &idempotentDelete
      tags: [Interactions]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Idempotent state removal. }
        '401': { $ref: '#/components/responses/Error' }
  /api/v1/notes/{note_id}/collect:
    parameters: [{ $ref: '#/components/parameters/NoteID' }]
    post: *idempotentCreate
    delete: *idempotentDelete
  /api/v1/comments/{comment_id}/like:
    parameters:
      - $ref: '#/components/parameters/CommentID'
    post: *idempotentCreate
    delete: *idempotentDelete
  /api/v1/notes/{note_id}/share:
    parameters: [{ $ref: '#/components/parameters/NoteID' }]
    post:
      tags: [Interactions]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: { type: string, maxLength: 64 }
      responses:
        '200': { description: Recorded share interaction. }
        '401': { $ref: '#/components/responses/Error' }
  /api/v1/rankings/notes/daily:
    get:
      tags: [Rankings]
      parameters:
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: Ranked note summaries without client-side N+1 requests.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    NoteID:
      in: path
      name: note_id
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    CommentID:
      in: path
      name: comment_id
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
  responses:
    AuthResponse:
      description: Access token response; refresh token is also set as HttpOnly cookie.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AuthResponse' }
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error: { type: string }
              detail: { type: string }
  schemas:
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, pattern: '^[a-zA-Z0-9_]{3,32}$' }
        password: { type: string, minLength: 8, maxLength: 128 }
        nickname: { type: string, maxLength: 64 }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      required: [user, access_token, expires_in]
      properties:
        user: { $ref: '#/components/schemas/User' }
        access_token: { type: string }
        refresh_token: { type: string, description: CLI compatibility; browsers should use the HttpOnly cookie. }
        expires_in: { type: integer, format: int64 }
    User:
      type: object
      required: [id, username, nickname, role, status]
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        nickname: { type: string }
        avatar_url: { type: string }
        bio: { type: string }
        role: { type: string }
        status: { type: string }
    CreateNoteRequest:
      type: object
      required: [title, body, category]
      properties:
        project_id: { type: integer, format: int64, default: 1 }
        visibility: { type: string, enum: [public, project], default: public }
        title: { type: string, maxLength: 255 }
        body: { type: string, maxLength: 20000 }
        category: { type: string, maxLength: 64 }
        topics: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        media:
          type: array
          items:
            type: object
            properties:
              media_type: { type: string }
              caption: { type: string }
              ocr_text: { type: string }
              position: { type: integer }
    Note:
      type: object
      required: [id, project_id, author_id, title, body, category, status, visibility, content_version]
      properties:
        id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64 }
        author_id: { type: integer, format: int64 }
        title: { type: string }
        body: { type: string }
        category: { type: string }
        status: { type: string }
        visibility: { type: string, enum: [public, project] }
        content_version: { type: integer, format: int64 }
        viewer_liked: { type: boolean }
        viewer_collected: { type: boolean }
        author: { $ref: '#/components/schemas/User' }
        media: { type: array, items: { type: object } }
    NotePage:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Note' } }
        next_cursor: { type: string }
    RetrievalSearchRequest:
      type: object
      required: [query]
      properties:
        project_id: { type: integer, format: int64, minimum: 1, default: 1 }
        dataset_version_id: { type: integer, format: int64, minimum: 1 }
        ingestion_run_id: { type: string, maxLength: 128 }
        query: { type: string, minLength: 1, maxLength: 2000 }
        mode: { type: string, enum: [lexical, vector, hybrid], default: lexical }
        limit: { type: integer, minimum: 1, maximum: 50, default: 10 }
        filters:
          type: object
          properties:
            document_types:
              type: array
              items: { type: string, enum: [note, note_media, note_comment_cluster, note_daily_fact, user_daily_fact] }
            source_types:
              type: array
              items: { type: string, enum: [note, note_media, note_comment_cluster, note_daily_fact, user_daily_fact] }
    RetrievalSearchResponse:
      type: object
      required: [mode, retriever_version, reranker_version, scope, query, decision, results, candidate_count, took_ms, external_model_calls, embedding_calls]
      properties:
        mode: { type: string, enum: [lexical, vector, hybrid] }
        retriever_version: { type: string }
        reranker_version: { type: string }
        scope: { $ref: '#/components/schemas/RetrievalScope' }
        query:
          type: object
          required: [original, terms, indexed_terms, candidate_terms]
          properties:
            original: { type: string }
            terms: { type: array, items: { type: string } }
            indexed_terms: { type: array, items: { type: string } }
            candidate_terms: { type: array, items: { type: string } }
            hinted_note_ids: { type: array, items: { type: integer, format: int64 } }
            preferred_document_type: { type: string }
        decision:
          type: object
          required: [status, reason, threshold, top_confidence]
          properties:
            status: { type: string, enum: [candidates, no_relevant_document] }
            reason: { type: string }
            threshold: { type: number }
            top_confidence: { type: number }
        results:
          type: array
          items: { $ref: '#/components/schemas/RetrievalResult' }
        candidate_count: { type: integer }
        took_ms: { type: number }
        external_model_calls: { type: integer, minimum: 0, maximum: 1 }
        embedding_calls: { type: integer, minimum: 0, maximum: 1 }
    RetrievalScope:
      type: object
      required: [project_id, dataset_id, dataset_version_id, ingestion_run_id, ingestion_output_checksum, parser_version, chunker_version, tokenizer_version, lexical_index_version, lexical_index_checksum]
      properties:
        project_id: { type: integer, format: int64 }
        project_visibility: { type: string }
        dataset_id: { type: integer, format: int64 }
        dataset_version_id: { type: integer, format: int64 }
        dataset_version: { type: integer, format: int64 }
        dataset_manifest_checksum: { type: string }
        ingestion_run_id: { type: string }
        ingestion_output_checksum: { type: string }
        parser_version: { type: string }
        chunker_version: { type: string }
        tokenizer_version: { type: string }
        lexical_index_version: { type: string }
        lexical_index_checksum: { type: string }
        vector_index_version: { type: string }
        vector_index_checksum: { type: string }
        vector_collection: { type: string }
        embedding_model: { type: string }
        embedding_revision: { type: string }
    RetrievalResult:
      type: object
      required: [rank, score, confidence, document_id, document_key, document_type, source_type, source_version, chunk_id, chunk_key, chunk_index, content, content_hash, start_byte, end_byte, citations]
      properties:
        rank: { type: integer, minimum: 1 }
        score: { type: number }
        confidence: { type: number }
        fts_score: { type: number }
        vector_score: { type: number }
        hybrid_score: { type: number }
        weighted_coverage: { type: number }
        document_id: { type: integer, format: int64 }
        document_key: { type: string }
        document_type: { type: string }
        source_type: { type: string }
        source_id: { type: integer, format: int64 }
        source_version: { type: integer, format: int64 }
        note_id: { type: integer, format: int64 }
        media_position: { type: integer }
        chunk_id: { type: integer, format: int64 }
        chunk_key: { type: string }
        chunk_index: { type: integer }
        content: { type: string }
        content_hash: { type: string }
        start_byte: { type: integer }
        end_byte: { type: integer }
        citations:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/SourceCitation' }
    SourceCitation:
      type: object
      required: [citation_id, citation_key, project_id, dataset_id, dataset_version_id, document_id, chunk_id, source_type, source_id, source_version, source_content_hash, parser_version, document_start_byte, document_end_byte, source_start_byte, source_end_byte, quote, quote_hash]
      properties:
        citation_id: { type: integer, format: int64 }
        citation_key: { type: string }
        project_id: { type: integer, format: int64 }
        dataset_id: { type: integer, format: int64 }
        dataset_version_id: { type: integer, format: int64 }
        document_id: { type: integer, format: int64 }
        chunk_id: { type: integer, format: int64 }
        source_type: { type: string }
        source_id: { type: integer, format: int64 }
        source_version: { type: integer, format: int64 }
        note_id: { type: integer, format: int64 }
        media_position: { type: integer }
        source_content_hash: { type: string }
        parser_version: { type: string }
        document_start_byte: { type: integer }
        document_end_byte: { type: integer }
        source_start_byte: { type: integer }
        source_end_byte: { type: integer }
        quote: { type: string }
        quote_hash: { type: string }
