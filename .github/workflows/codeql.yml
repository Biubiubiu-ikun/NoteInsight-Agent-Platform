name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          output: codeql-results
          upload: ${{ vars.CODEQL_UPLOAD == 'true' && 'always' || 'never' }}
          upload-database: false

      - name: Enforce zero CodeQL findings when platform upload is unavailable
        if: vars.CODEQL_UPLOAD != 'true'
        shell: pwsh
        run: |
          $sarifFiles = Get-ChildItem codeql-results -Recurse -Filter *.sarif
          if ($sarifFiles.Count -eq 0) {
            throw "CodeQL produced no SARIF files."
          }

          $findingCount = 0
          foreach ($file in $sarifFiles) {
            $sarif = Get-Content $file.FullName -Raw | ConvertFrom-Json
            foreach ($run in $sarif.runs) {
              $findingCount += @($run.results).Count
            }
          }

          Write-Host "CodeQL findings: $findingCount"
          if ($findingCount -gt 0) {
            throw "CodeQL reported $findingCount finding(s). Inspect the SARIF artifact."
          }

      - name: Upload local CodeQL SARIF
        if: always() && vars.CODEQL_UPLOAD != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: codeql-${{ matrix.language }}-sarif
          path: codeql-results
          if-no-files-found: error
