name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-go

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Unit tests with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Enforce Go coverage floor
        shell: pwsh
        run: ../scripts/check_go_coverage.ps1 -CoverageFile coverage.out -MinimumPercent 25.0

      - name: Vet
        run: go vet ./...

      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Build all commands
        run: go build ./cmd/...

      - name: Verify frozen retrieval benchmark checksums
        run: go run ./cmd/evalfreeze -verify-only -output-dir ../evaluation/benchmarks/retrieval_v4

      - name: Simulator quality smoke
        run: go run ./cmd/simulator --profile=smoke --sessions=100 --no-event-files --strict=true

      - name: Capacity seed profile smoke
        run: go run ./cmd/seedgen --profile=capacity --dry-run

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: backend-go/coverage.out

  compose-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Compose
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml \
            -f deploy/observability/docker-compose.observability.yml config --quiet
          docker compose --env-file deploy/compose/capacity.env \
            -p noteinsight-capacity config --quiet

      - name: Validate contracts and dashboards
        run: |
          python -m json.tool docs/contracts/domain-event-v1.schema.json >/dev/null
          python -m json.tool deploy/observability/grafana/dashboards/platform-overview.json >/dev/null
          python -m pip install --disable-pip-version-check openapi-spec-validator==0.7.2
          openapi-spec-validator docs/openapi.yaml

      - name: Validate Prometheus configuration and alert rules
        run: |
          docker run --rm \
            -v "$PWD/deploy/observability:/etc/prometheus:ro" \
            --entrypoint promtool \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml

      - name: Scan Git history for secrets
        run: |
          docker run --rm \
              -v "$PWD:/repo" \
              -w /repo \
              zricethezav/gitleaks:v8.24.3 \
              git --config .gitleaks.toml --redact --verbose

      - name: Lint GitHub Actions workflows
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            rhysd/actionlint:1.7.7

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

  integration:
    needs: [go-quality, frontend-quality, compose-validation]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RATE_LIMIT_ENABLED: "false"
      RECONCILE_ENABLED: "false"
      POSTGRES_DSN: postgres://creatorinsight:creatorinsight@127.0.0.1:15432/creatorinsight?sslmode=disable
      NATS_URL: nats://127.0.0.1:14222

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Linux service binaries
        shell: pwsh
        run: ./scripts/build_backend_linux.ps1

      - name: Start application stack
        run: docker compose up -d --build --wait

      - name: Apply migrations twice
        shell: pwsh
        run: |
          ./scripts/migrate.ps1
          ./scripts/migrate.ps1

      - name: Run authenticated API and async pipeline acceptance
        shell: pwsh
        run: ./scripts/smoke_phase2c_auth.ps1 -ConvergenceTimeoutSeconds 60

      - name: Run PostgreSQL, concurrency, Outbox, and DLQ integration tests
        working-directory: backend-go
        run: go test -tags=integration -count=1 -v ./integration

      - name: Install browser test dependencies
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run live desktop and mobile E2E
        working-directory: frontend
        run: npm run test:e2e

      - name: Generate SPDX image SBOM
        run: |
          mkdir -p artifacts
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/artifacts:/out" \
            anchore/syft:v1.20.0 \
            noteinsight/platform:local -o spdx-json=/out/platform-sbom.spdx.json

      - name: Scan runtime image for fixable high and critical vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.59.1 \
            image --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL --scanners vuln noteinsight/platform:local

      - name: Upload image SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: platform-image-sbom
          path: artifacts/platform-sbom.spdx.json
          if-no-files-found: ignore

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Show diagnostics on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --no-color --tail=300

      - name: Stop application stack
        if: always()
        run: docker compose down -v --remove-orphans
