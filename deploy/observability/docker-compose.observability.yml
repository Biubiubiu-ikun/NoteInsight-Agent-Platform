services:
  backend:
    environment:
      APP_VERSION: "${IMAGE_TAG:-local}"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-1.0}"
    depends_on:
      otel-collector:
        condition: service_started

  worker:
    environment:
      APP_VERSION: "${IMAGE_TAG:-local}"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-1.0}"
    depends_on:
      otel-collector:
        condition: service_started

  tempo:
    image: grafana/tempo:3.0.2
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-tempo"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./deploy/observability/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-13200}:3200"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-otel-collector"
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./deploy/observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-14317}:4317"
      - "${OTEL_HTTP_PORT:-14318}:4318"
      - "${OTEL_HEALTH_PORT:-13133}:13133"
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-prometheus"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      - backend
      - worker
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-grafana"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-noteinsight-local}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
