global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: noteinsight-api
    static_configs:
      - targets: [backend:8080]
  - job_name: noteinsight-worker
    static_configs:
      - targets: [worker:8081]
  - job_name: noteinsight-qdrant
    metrics_path: /metrics
    static_configs:
      - targets: [qdrant:6333]
  - job_name: noteinsight-tei
    metrics_path: /metrics
    static_configs:
      - targets: [text-embeddings:80]
