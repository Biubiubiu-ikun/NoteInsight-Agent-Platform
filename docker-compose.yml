services:
  backend:
    image: "${PLATFORM_IMAGE:-noteinsight/platform}:${IMAGE_TAG:-local}"
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-backend"
    environment:
      APP_ENV: local
      GIN_MODE: "${GIN_MODE:-release}"
      LOG_LEVEL: info
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      HTTP_ALLOWED_ORIGINS: "${HTTP_ALLOWED_ORIGINS:-http://127.0.0.1:15173,http://localhost:15173,http://127.0.0.1:5173,http://localhost:5173}"
      HTTP_TRUSTED_PROXIES: "${HTTP_TRUSTED_PROXIES:-}"
      POSTGRES_DSN: postgres://creatorinsight:creatorinsight@postgres:5432/creatorinsight?sslmode=disable
      REDIS_ADDR: redis:6379
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_CONTENT_WRITE_LIMIT: "${RATE_LIMIT_CONTENT_WRITE_LIMIT:-30}"
      RATE_LIMIT_COMMENT_WRITE_LIMIT: "${RATE_LIMIT_COMMENT_WRITE_LIMIT:-60}"
      RATE_LIMIT_INTERACTION_WRITE_LIMIT: "${RATE_LIMIT_INTERACTION_WRITE_LIMIT:-120}"
      RECONCILE_ENABLED: "${RECONCILE_ENABLED:-true}"
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: "${PLATFORM_IMAGE:-noteinsight/platform}:${IMAGE_TAG:-local}"
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-worker"
    entrypoint: ["/app/creatorinsight-worker"]
    environment:
      APP_NAME: noteinsight-worker
      APP_ENV: local
      LOG_LEVEL: info
      POSTGRES_DSN: postgres://creatorinsight:creatorinsight@postgres:5432/creatorinsight?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: NOTEINSIGHT_EVENTS
      NATS_SUBJECT_PREFIX: noteinsight.events
      NATS_DLQ_STREAM: NOTEINSIGHT_DLQ
      NATS_DLQ_SUBJECT_PREFIX: noteinsight.dlq
      NATS_CONSUMER: noteinsight-worker-v1
      WORKER_HTTP_HOST: 0.0.0.0
      WORKER_HTTP_PORT: 8081
      RECONCILE_ENABLED: "${RECONCILE_ENABLED:-true}"
    ports:
      - "${WORKER_PORT:-18081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-postgres"
    command:
      - postgres
      - -c
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}"
      - -c
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-1GB}"
      - -c
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-5min}"
      - -c
      - "wal_compression=${POSTGRES_WAL_COMPRESSION:-off}"
    environment:
      POSTGRES_USER: creatorinsight
      POSTGRES_PASSWORD: creatorinsight
      POSTGRES_DB: creatorinsight
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatorinsight -d creatorinsight"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-redis"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  nats:
    image: nats:2.12-alpine
    container_name: "${CONTAINER_PREFIX:-creatorinsight}-nats"
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-14222}:4222"
      - "${NATS_MONITOR_PORT:-18222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
